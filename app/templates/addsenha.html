{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="text-center mb-4">Guardar Nova Credencial</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nome do Site/App</label>
                    <input type="text" class="form-control" placeholder="Ex: Gmail, Banco do Brasil">
                </div>
                <div class="mb-3">
                    <label class="form-label">Usuário ou E-mail</label>
                    <input type="text" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Dica de Lembrete (O que te faz lembrar a senha?)</label>
                    <textarea class="form-control" rows="2" placeholder="Ex: Minha comida favorita com o número da sorte"></textarea>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Salvar com Segurança</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
