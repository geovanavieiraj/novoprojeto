<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Memória - Senhas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #fce4ec; color: #4a4a4a; }
        .navbar { background-color: #ff8a80; box-shadow: 0 4px 12px rgba(255, 138, 128, 0.3); }
        .navbar-brand { font-weight: 700; font-size: 1.5rem; }
        .card { border: none; box-shadow: 0 8px 16px rgba(0,0,0,0.05); border-radius: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; background-color: #ffffff; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #ff8a80; border: none; border-radius: 20px; font-weight: 600; }
        .btn-primary:hover { background-color: #ff5252; box-shadow: 0 4px 12px rgba(255, 82, 82, 0.4); }
        .btn-outline-secondary { border-radius: 20px; font-weight: 600; }
        .bg-light { background-color: #fff8e1 !important; border-color: #ffe082 !important; }
        h2, h3 { color: #ff5252; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4 py-3">
        <div class="container">
            <a class="navbar-brand" href="{% url 'lista_senhas' %}">✨ Memória Segura</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="{% url 'lista_senhas' %}">Minhas Senhas</a>
                <a class="nav-link btn btn-light text-danger fw-bold btn-sm ms-lg-2 px-3 rounded-pill" href="/admin/logout/">Sair</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleSenha(elementId) {
            var el = document.getElementById(elementId);
            if (el.style.filter === 'blur(5px)') {
                el.style.filter = 'none';
            } else {
                el.style.filter = 'blur(5px)';
            }
        }
    </script>
</body>
</html>
